{% extends "account/base.html" %}
{% block title %}Reset password — TOC Generator{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Reset your password</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Send reset link →</button>
    </form>
    <p class="auth-footer"><a href="{% url 'account_login' %}">← Back to sign in</a></p>
  </div>
</div>
{% endblock %}
